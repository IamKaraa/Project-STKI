<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesin Pencari STKI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .search-container { margin-top: 10vh; transition: margin 0.3s ease; }
        .result-card { border-left: 4px solid #0d6efd; transition: transform 0.2s; }
        .result-card:hover { transform: translateX(5px); }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center search-container" id="searchHeader">
        <div class="col-md-8 text-center mb-4">
            <h2 class="text-primary fw-bold">STKI Search</h2>
            <form id="searchForm" class="d-flex shadow-sm rounded">
                <input type="text" id="searchInput" class="form-control form-control-lg border-0" 
                       placeholder="Cari dokumen regulasi ketenagakerjaan, JHT, stunting..." required>
                <button type="submit" class="btn btn-primary btn-lg px-4 border-0">Cari</button>
            </form>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div id="statusMessage" class="text-muted mb-4 text-center"></div>
            <div id="resultsArea"></div>
        </div>
    </div>
</div>

<script>
    // Memanggil API Python di rute yang sama secara langsung
    const API_URL = '/search';

    document.getElementById('searchForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const query = document.getElementById('searchInput').value;
        const resultsArea = document.getElementById('resultsArea');
        const statusMessage = document.getElementById('statusMessage');
        const searchHeader = document.getElementById('searchHeader');

        // Animasi naik saat mencari
        searchHeader.style.marginTop = '3vh';
        statusMessage.innerHTML = '<i>Mencari dokumen...</i>';
        resultsArea.innerHTML = '';

        try {
            const response = await fetch(`${API_URL}?q=${encodeURIComponent(query)}`);
            const data = await response.json();

            if (data.total_hasil === 0) {
                statusMessage.innerHTML = `Tidak ada dokumen yang relevan untuk <strong>"${query}"</strong>.`;
                return;
            }

            statusMessage.innerHTML = `Menemukan ${data.total_hasil} hasil untuk <strong>"${query}"</strong>`;
            
            data.data.forEach(item => {
                resultsArea.innerHTML += `
                    <div class="card mb-3 border-0 shadow-sm result-card">
                        <div class="card-body">
                            <h5 class="card-title mb-1">
                                <a href="${item.url_sumber}" target="_blank" class="text-decoration-none">${item.judul}</a>
                            </h5>
                            <span class="badge bg-success mb-2">Skor Relevansi: ${item.skor_relevansi}</span>
                            <p class="card-text text-muted mb-2">${item.konten_snippet}</p>
                            <small class="text-primary">${item.url_sumber}</small>
                        </div>
                    </div>
                `;
            });
        } catch (error) {
            statusMessage.innerHTML = `<span class="text-danger">Gagal terhubung ke server pencarian.</span>`;
        }
    });
</script>
</body>
</html>
