<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cari Jurnal Reii</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .search-container { margin-top: 5vh; transition: margin 0.3s ease; }
        .result-card { border-left: 4px solid #0d6efd; transition: transform 0.2s; cursor: pointer; }
        .result-card:hover { transform: translateX(5px); background-color: #f1f7ff; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center search-container" id="searchHeader">
        <div class="col-md-8 text-center mb-4">
            <h2 class="text-primary fw-bold">CJR</h2>
            <form id="searchForm" class="d-flex shadow-sm rounded">
                <input type="text" id="searchInput" class="form-control form-control-lg border-0" 
                       placeholder="Cari dokumen..." required>
                <button type="submit" class="btn btn-primary btn-lg px-4 border-0">Cari</button>
            </form>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div id="statusMessage" class="text-muted mb-4 text-center"></div>
            <div id="resultsArea"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="dokumenModal" tabindex="-1" aria-labelledby="dokumenModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title text-primary fw-bold" id="modalJudul">Judul Dokumen</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p id="modalDeskripsi" class="text-muted" style="text-align: justify;">Deskripsi dokumen akan muncul di sini.</p>
      </div>
      <div class="modal-footer border-0 pt-0">
        <a href="#" id="modalLink" target="_blank" class="btn btn-primary w-100">Buka Sumber Asli</a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const API_URL_SEARCH = '/search';
    const API_URL_ALL = '/all-documents';

    const resultsArea = document.getElementById('resultsArea');
    const statusMessage = document.getElementById('statusMessage');
    const searchInput = document.getElementById('searchInput');
    
    // Variabel penampung data agar bisa dibaca oleh Modal
    let dataDokumenAktif = []; 
    // Inisialisasi Modal Bootstrap
    let modalInstance;

    // Tunggu halaman selesai dimuat
    window.addEventListener('DOMContentLoaded', () => {
        modalInstance = new bootstrap.Modal(document.getElementById('dokumenModal'));
        loadAllDocuments();
    });

    // Fungsi untuk memunculkan Pop-up
    function bukaModal(index) {
        const item = dataDokumenAktif[index];
        document.getElementById('modalJudul').innerText = item.judul;
        
        // Pilih deskripsi yang tepat (tergantung dari rute all-documents atau search)
        const deskripsi = item.konten_snippet ? item.konten_snippet : item.konten.substring(0, 200) + '...';
        document.getElementById('modalDeskripsi').innerText = deskripsi;
        
        document.getElementById('modalLink').href = item.url_sumber;
        modalInstance.show();
    }

    async function loadAllDocuments() {
        statusMessage.innerHTML = '<i>Memuat daftar dokumen...</i>';
        resultsArea.innerHTML = '';
        searchInput.value = '';

        try {
            const response = await fetch(API_URL_ALL);
            const data = await response.json();
            
            dataDokumenAktif = data.data; // Simpan ke memori sementara

            statusMessage.innerHTML = `<h5 class="border-bottom pb-2 mb-3">Semua Dokumen Tersedia (${data.total} Dokumen)</h5>`;
            
            data.data.forEach((item, index) => {
                resultsArea.innerHTML += `
                    <div class="card mb-3 border-0 shadow-sm result-card" onclick="bukaModal(${index})">
                        <div class="card-body">
                            <h5 class="card-title mb-1 text-primary">
                                ${item.judul}
                            </h5>
                            <p class="card-text text-muted mb-2">${item.konten.substring(0, 150)}...</p>
                            <small class="text-primary">Klik untuk lihat detail</small>
                        </div>
                    </div>
                `;
            });
        } catch (error) {
            statusMessage.innerHTML = `<span class="text-danger">Gagal memuat dokumen dari server.</span>`;
        }
    }

    document.getElementById('searchForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const query = searchInput.value;

        statusMessage.innerHTML = '<i>Mencari dokumen...</i>';
        resultsArea.innerHTML = '';

        try {
            const response = await fetch(`${API_URL_SEARCH}?q=${encodeURIComponent(query)}`);
            const data = await response.json();
            
            dataDokumenAktif = data.data; // Simpan data hasil pencarian

            if (data.total_hasil === 0) {
                statusMessage.innerHTML = `Tidak ada dokumen yang relevan untuk <strong>"${query}"</strong>.<br>
                <button class="btn btn-link mt-2" onclick="loadAllDocuments()">Kembali ke Semua Dokumen</button>`;
                return;
            }

            statusMessage.innerHTML = `Menemukan ${data.total_hasil} hasil untuk <strong>"${query}"</strong>.<br>
            <button class="btn btn-sm btn-outline-secondary mt-2" onclick="loadAllDocuments()">Kembali ke Semua Dokumen</button>`;
            
            data.data.forEach((item, index) => {
                resultsArea.innerHTML += `
                    <div class="card mb-3 border-0 shadow-sm result-card" onclick="bukaModal(${index})">
                        <div class="card-body">
                            <h5 class="card-title mb-1 text-primary">
                                ${item.judul}
                            </h5>
                            <span class="badge bg-success mb-2">Skor Relevansi: ${item.skor_relevansi}</span>
                            <p class="card-text text-muted mb-2">${item.konten_snippet}</p>
                            <small class="text-primary">Klik untuk lihat detail</small>
                        </div>
                    </div>
                `;
            });
        } catch (error) {
            statusMessage.innerHTML = `<span class="text-danger">Gagal terhubung ke server pencarian.</span>`;
        }
    });
</script>
</body>
</html>
